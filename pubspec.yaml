name: unimind
description: "Learn as you go"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  bloc: ^9.1.0
  cached_network_image: ^3.4.1
  # card_swiper: ^3.0.1
  cloud_firestore: ^6.1.0
  dotted_border: ^3.1.0
  equatable: ^2.0.8
  firebase_core: ^4.2.1
  flex_color_picker: ^3.7.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localization: ^0.3.3
  flutter_native_splash: ^2.4.7
  get_it: ^7.6.0
  hugeicons: ^1.1.1
  meta: ^1.16.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  timeago: ^3.7.1
  timelines_plus: ^1.0.8
  url_launcher: ^6.3.2
  device_info_plus: ^12.3.0
  headset_connection_event: ^4.1.0
  permission_handler: ^12.0.1
  youtube_player_flutter: ^9.1.3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300

  assets:
    - assets/lang/
    - assets/logo/